[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
solc     = "0.8.20"
optimizer        = true
optimizer_runs   = 200
via_ir           = true

[rpc_endpoints]
anvil   = "http://localhost:8545"
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"


[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = "sepolia" }
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = "mainnet" }